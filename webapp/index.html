<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    connect-src 'self' https://api.pwnedpasswords.com;
    font-src 'self';
    form-action 'self';
    base-uri 'self';
  " />

    <link rel="icon" type="image/svg+xml" href="/nodewarden-logo-bg.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NodeWarden" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>NodeWarden</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #eef4ff;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .boot-card {
        width: min(420px, 100%);
        display: grid;
        gap: 14px;
        justify-items: center;
        padding: 28px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
      }

      .boot-logo {
        width: 74px;
        height: 58px;
        object-fit: contain;
      }

      .boot-line {
        width: 72%;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, #dbeafe, #bfdbfe, #dbeafe);
        background-size: 180% 100%;
        animation: boot-shimmer 1.2s ease-in-out infinite;
      }

      .boot-line.short {
        width: 46%;
      }

      @keyframes boot-shimmer {
        0% { background-position: 180% 0; }
        100% { background-position: -180% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card" aria-label="Loading NodeWarden">
          <img class="boot-logo" src="/nodewarden-logo.svg" alt="" />
          <div class="boot-line"></div>
          <div class="boot-line short"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
